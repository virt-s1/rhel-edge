---
name: Run Fedora 42 IoT test

on:
  issue_comment:
    types:
      - created

permissions: {}

jobs:
  check-permissions:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.pull_request &&
            (endsWith(github.event.comment.body, '/test-f42-iot')) }}
    steps:
      - name: Query author repository permissions
        uses: octokit/request-action@dad4362715b7fb2ddedf9772c8670824af564f0d # v2.4.0
        id: user_permission
        with:
          route: GET /repos/${{ github.repository }}/collaborators/${{ github.event.sender.login }}/permission
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if user does have correct permissions
        if: contains('admin write', fromJson(steps.user_permission.outputs.data).permission)
        id: check_user_perm
        run: |
          echo "User '${{ github.event.sender.login }}' has permission '${{ fromJson(steps.user_permission.outputs.data).permission }}' allowed values: 'admin', 'write'"
          echo "allowed_user=true" >> $GITHUB_OUTPUT

      - name: Get information for pull request
        uses: octokit/request-action@dad4362715b7fb2ddedf9772c8670824af564f0d # v2.4.0
        id: pr-api
        with:
          route: GET /repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      allowed_user: ${{ steps.check_user_perm.outputs.allowed_user }}
      compose_id: ${{ fromJson(steps.pr-api.outputs.data).body }}
      sha: ${{ fromJson(steps.pr-api.outputs.data).head.sha }}
      ref: ${{ fromJson(steps.pr-api.outputs.data).head.ref }}
      repo_url: ${{ fromJson(steps.pr-api.outputs.data).head.repo.html_url }}

  iot-42-x86:
    permissions:
      contents: read
      statuses: write
    needs: check-permissions
    if: ${{ needs.check-permissions.outputs.allowed_user == 'true' && github.event.issue.pull_request }}
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.check-permissions.outputs.sha }}
          fetch-depth: 0

      - name: Run the tests
        uses: sclorg/testing-farm-as-github-action@270f0d1d89dad513588fb5cc2cdd512c3459f3fe # v3.1.2
        id: run-test
        with:
          compose: Fedora-42
          arch: x86_64
          api_key: ${{ secrets.TF_API_KEY }}
          git_url: ${{ needs.check-permissions.outputs.repo_url }}
          git_ref: ${{ needs.check-permissions.outputs.ref }}
          update_pull_request_status: true
          tmt_context: "arch=x86_64;distro=fedora-42"
          pull_request_status_name: "iot-f42-x86"
          tmt_plan_regex: iot-x86
          tf_scope: private
          variables: "COMPOSE=${{ needs.check-permissions.outputs.compose_id }}"

      - name: Send test results to Slack via webhook
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            emoji=":white_check_mark:"
          else
            emoji=":x:"
          fi

          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "Testing Farm Results for Fedora 42 IoT x86",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "'"$emoji"' *Fedora-42 | x86_64 | Compose-id: ${{ needs.check-permissions.outputs.compose_id }} |* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Test Log>"
                }
              }
            ]
          }' ${{ secrets.SLACK_WEBHOOK_URL_FEDORA_IOT_CI }}

