---
name: FDO container test trigger

on:
  workflow_dispatch:
  schedule:
    # run 8:05 every Sunday
    - cron: '5 8 * * 0'
    # run 8:05 every Thursday
    - cron: '5 8 * * 4'
    # run every day
    - cron: '0 3 * * *'

permissions: {}

jobs:
  verify-pat:
    if: github.repository == 'virt-s1/rhel-edge'
    runs-on: ubuntu-latest
    steps:
      - name: Verify PAT is configured
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "::error::secrets.PAT is not configured."
            exit 1
          fi
        env:
          PAT_TOKEN: ${{ secrets.PAT }}

  fdo-container-community:
    permissions:
      contents: write
      pull-requests: write
    needs: [verify-pat]
    if: github.repository == 'virt-s1/rhel-edge' && github.event.schedule == '5 8 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Make change for PR creating
        run: |
          echo "fdo-container" > fdo-container.run

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT }}
          commit-message: "chore: FDO community container test - ${{ steps.date.outputs.date }}"
          committer: cloudkitebot <henrywangxf1@gmail.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          branch: cpr
          branch-suffix: random
          delete-branch: true
          title: "FDO community container test - ${{ steps.date.outputs.date }}"
          labels: DO_NOT_MERGE,fdo-container
          body: |
            FDO community container test
            - Date: ${{ steps.date.outputs.date }}

      - name: Add a comment to trigger test workflow
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ secrets.PAT }}
          issue-number: ${{ steps.cpr.outputs.pull-request-number }}
          body: /test-fdo-container-community

  fdo-container-official:
    permissions:
      contents: write
      pull-requests: write
    needs: [verify-pat]
    if: github.repository == 'virt-s1/rhel-edge' && github.event.schedule == '5 8 * * 4'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Make change for PR creating
        run: |
          echo "fdo-container" > fdo-container.run

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT }}
          commit-message: "chore: FDO official container test - ${{ steps.date.outputs.date }}"
          committer: cloudkitebot <henrywangxf1@gmail.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          branch: cpr
          branch-suffix: random
          delete-branch: true
          title: "FDO official container test - ${{ steps.date.outputs.date }}"
          labels: DO_NOT_MERGE,fdo-container
          body: |
            FDO official container test
            - Date: ${{ steps.date.outputs.date }}

      - name: Add a comment to trigger test workflow
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ secrets.PAT }}
          issue-number: ${{ steps.cpr.outputs.pull-request-number }}
          body: /test-fdo-container-official
