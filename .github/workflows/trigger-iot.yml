---
name: Trigger Fedora-IoT image test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

permissions: {}

env:
  COMPOSE_URL_44: https://kojipkgs.fedoraproject.org/compose/iot/latest-Fedora-IoT-44
  COMPOSE_URL_45: https://kojipkgs.fedoraproject.org/compose/iot/latest-Fedora-IoT-45

jobs:
  check-compose:
    permissions:
      contents: read
      pull-requests: read
    if: github.repository == 'virt-s1/rhel-edge'
    runs-on: ubuntu-latest
    steps:
      - name: Verify PAT is configured
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "::error::secrets.PAT is not configured."
            exit 1
          fi
        env:
          PAT_TOKEN: ${{ secrets.PAT }}

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get compose ID for Fedora 44 IoT
        id: get-compose-f44
        run: |
          status=$(curl -sf ${COMPOSE_URL_44}/STATUS)
          if [ "$status" != "FINISHED" ]; then
            echo "Compose status: $status - no PR needed"
            echo "need-pr-f44=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          compose_id_f44=$(curl -sf ${COMPOSE_URL_44}/COMPOSE_ID)
          echo "compose-id-f44=$compose_id_f44" >> $GITHUB_OUTPUT

          if grep -q "$compose_id_f44" compose/compose.f44-iot; then
            echo "This compose has been tested already"
            echo "need-pr-f44=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open")
          if echo "$response" | grep -q "$compose_id_f44"; then
            echo "This compose is being tested now, skip it."
            echo "need-pr-f44=false" >> $GITHUB_OUTPUT
          else
            echo "This is a new compose, will trigger test soon."
            echo "need-pr-f44=true" >> $GITHUB_OUTPUT
          fi

      - name: Get compose ID for Fedora 45 IoT
        id: get-compose-f45
        run: |
          status=$(curl -sf ${COMPOSE_URL_45}/STATUS)
          if [ "$status" != "FINISHED" ]; then
            echo "Compose status: $status - no PR needed"
            echo "need-pr-f45=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          compose_id_f45=$(curl -sf ${COMPOSE_URL_45}/COMPOSE_ID)
          echo "compose-id-f45=$compose_id_f45" >> $GITHUB_OUTPUT

          if grep -q "$compose_id_f45" compose/compose.f45-iot; then
            echo "This compose has been tested already"
            echo "need-pr-f45=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open")
          if echo "$response" | grep -q "$compose_id_f45"; then
            echo "This compose is being tested now, skip it."
            echo "need-pr-f45=false" >> $GITHUB_OUTPUT
          else
            echo "This is a new compose, will trigger test soon."
            echo "need-pr-f45=true" >> $GITHUB_OUTPUT
          fi

    outputs:
      need-pr-f44: ${{ steps.get-compose-f44.outputs.need-pr-f44 }}
      compose-id-f44: ${{ steps.get-compose-f44.outputs.compose-id-f44 }}
      need-pr-f45: ${{ steps.get-compose-f45.outputs.need-pr-f45 }}
      compose-id-f45: ${{ steps.get-compose-f45.outputs.compose-id-f45 }}

  create-pr-f44:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    needs: check-compose
    if: needs.check-compose.outputs.need-pr-f44 == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Update compose_id_44 file
        run: |
          echo "${{ needs.check-compose.outputs.compose-id-f44 }}" >> compose/compose.f44-iot

      - name: Create Pull Request for IoT 44
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT }}
          title: "${{ needs.check-compose.outputs.compose-id-f44 }}"
          branch: cpr
          branch-suffix: random
          base: main
          body: "${{ needs.check-compose.outputs.compose-id-f44 }}"
          commit-message: "chore: add compose ID ${{ needs.check-compose.outputs.compose-id-f44 }} to compose file"
          labels: |
            automated-pr

      - name: Add test comment to PR
        if: steps.create-pr.outputs.pull-request-number
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ secrets.PAT }}
          issue-number: ${{ steps.create-pr.outputs.pull-request-number }}
          body: /test-f44-iot

  create-pr-f45:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    needs: check-compose
    if: needs.check-compose.outputs.need-pr-f45 == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Update compose_id_45 file
        run: |
          echo "${{ needs.check-compose.outputs.compose-id-f45 }}" >> compose/compose.f45-iot

      - name: Create Pull Request for IoT 45
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PAT }}
          title: "${{ needs.check-compose.outputs.compose-id-f45 }}"
          branch: cpr
          branch-suffix: random
          base: main
          body: "${{ needs.check-compose.outputs.compose-id-f45 }}"
          commit-message: "chore: add compose ID ${{ needs.check-compose.outputs.compose-id-f45 }} to compose file"
          labels: |
            automated-pr

      - name: Add test comment to PR
        if: steps.create-pr.outputs.pull-request-number
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ secrets.PAT }}
          issue-number: ${{ steps.create-pr.outputs.pull-request-number }}
          body: /test-f45-iot
